<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #863bff;
            --sub-text: #65676b;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #ffffff;
                --accent-color: #a87ffb;
                --sub-text: #a0a0a0;
            }
        }
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        header {
            padding: 20px 30px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            opacity: 0.3;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            width: 100%;
        }
        .joke-display {
            width: 100%;
            max-width: 1200px;
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.03em;
            text-align: center;
            word-wrap: break-word;
        }
        .delivery {
            font-weight: 700;
            margin-top: 0.5em;
            color: var(--accent-color);
        }
        .source-link {
            font-size: 0.7rem;
            margin-top: 20px;
            opacity: 0.4;
            color: var(--sub-text);
        }
        .source-link a {
            color: inherit;
            text-decoration: none;
        }
        .source-link a:hover {
            text-decoration: underline;
        }
        .share-btn {
            margin-top: 40px;
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.5;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .share-btn:active {
            opacity: 1;
            background: var(--accent-color);
            color: white;
        }
        .timer-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
        }
        .timer-progress {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
        }
        .counter {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 0.8rem;
            color: var(--sub-text);
            opacity: 0.6;
            font-weight: 400;
            z-index: 20;
        }
    </style>
</head>
<body>
    <header>
        <h1>Maki</h1>
    </header>
    <main>
        <div class="joke-display" id="joke-container">
            <div id="setup">Cargando...</div>
            <div id="delivery" class="delivery"></div>
            <div id="source" class="source-link"></div>
            <button id="share-btn" class="share-btn" onclick="shareJoke()">Compartir</button>
        </div>
    </main>
    <div class="counter" id="counter">Vistos 0%</div>
    <div class="timer-container">
        <div class="timer-progress" id="progress"></div>
    </div>

    <script>
        const JOKE_FILE = 'jokes.json';
        let seenJokes = JSON.parse(localStorage.getItem('seenJokes')) || [];
        let timerInterval;

        async function fetchJoke() {
            const setupEl = document.getElementById('setup');
            const deliveryEl = document.getElementById('delivery');
            const sourceEl = document.getElementById('source');
            
            if (timerInterval) cancelAnimationFrame(timerInterval);
            
            try {
                const response = await fetch(`${JOKE_FILE}?cb=${Date.now()}`);
                const jokes = await response.json();
                
                let availableJokes = jokes.filter(j => !seenJokes.includes(j.id));
                
                if (availableJokes.length === 0) {
                    seenJokes = [];
                    availableJokes = jokes;
                }

                const data = availableJokes[Math.floor(Math.random() * availableJokes.length)];
                window.currentJoke = data;

                seenJokes.push(data.id);
                localStorage.setItem('seenJokes', JSON.stringify(seenJokes));
                
                setupEl.innerText = data.setup;
                deliveryEl.innerText = data.delivery || '';
                
                if (data.source) {
                    sourceEl.innerHTML = `<a href="${data.source}" target="_blank">Fuente original</a>`;
                } else {
                    sourceEl.innerHTML = '';
                }
                
                const progressTotal = Math.round((seenJokes.length / jokes.length) * 100);
                document.getElementById('counter').innerText = `Vistos ${progressTotal}%`;
            } catch (error) {
                setupEl.innerText = "Error al cargar chistes.";
                deliveryEl.innerText = "";
            }
        }

        async function shareJoke() {
            if (!window.currentJoke) return;
            const text = window.currentJoke.delivery 
                ? `${window.currentJoke.setup}\n\n${window.currentJoke.delivery}`
                : window.currentJoke.setup;
            const shareData = { title: 'Maki 🍣', text: text, url: window.location.href };
            try {
                if (navigator.share) { await navigator.share(shareData); }
                else { await navigator.clipboard.writeText(`${text}\n\n${window.location.href}`); alert('Copiado'); }
            } catch (err) {}
        }

        function resetTimer() {
            const progressEl = document.getElementById('progress');
            let start = null;
            const duration = 10000;
            if (timerInterval) cancelAnimationFrame(timerInterval);
            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = timestamp - start;
                const percentage = Math.min((progress / duration) * 100, 100);
                progressEl.style.width = percentage + '%';
                if (progress < duration) { timerInterval = requestAnimationFrame(step); }
                else { fetchJoke(); }
            }
            timerInterval = requestAnimationFrame(step);
        }

        fetchJoke();
    </script>
</body>
</html>
