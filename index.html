<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #863bff;
        }
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        header {
            padding: 20px 30px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            opacity: 0.3;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            width: 100%;
        }
        .joke-display {
            width: 100%;
            max-width: 1200px;
            /* Ajuste dinámico de texto: grande pero flexible */
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.03em;
            text-align: left;
            word-wrap: break-word;
        }
        .delivery {
            font-weight: 700;
            margin-top: 0.5em;
            color: var(--accent-color);
        }
        .timer-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
        }
        .timer-progress {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Maki</h1>
    </header>
    <main>
        <div class="joke-display" id="joke-container">
            <div id="setup">Cargando...</div>
            <div id="delivery" class="delivery"></div>
        </div>
    </main>
    <div class="timer-container">
        <div class="timer-progress" id="progress"></div>
    </div>

    <script>
        const JOKE_FILE = 'jokes.json';
        let seenJokes = JSON.parse(localStorage.getItem('seenJokes')) || [];
        let timerInterval;

        async function fetchJoke() {
            const setupEl = document.getElementById('setup');
            const deliveryEl = document.getElementById('delivery');
            
            if (timerInterval) cancelAnimationFrame(timerInterval);
            
            try {
                const response = await fetch(`${JOKE_FILE}?cb=${Date.now()}`);
                const jokes = await response.json();
                
                // Filtramos los que no hayamos visto
                let availableJokes = jokes.filter(j => !seenJokes.includes(j.id));
                
                // Si los hemos visto todos, reseteamos el historial local
                if (availableJokes.length === 0) {
                    seenJokes = [];
                    availableJokes = jokes;
                }

                const data = availableJokes[Math.floor(Math.random() * availableJokes.length)];

                seenJokes.push(data.id);
                localStorage.setItem('seenJokes', JSON.stringify(seenJokes));
                
                setupEl.innerText = data.setup;
                deliveryEl.innerText = data.delivery || ''; // Si no hay delivery, queda vacío
                
            } catch (error) {
                setupEl.innerText = "Error al cargar chistes locales.";
                deliveryEl.innerText = "";
            }
        }

        function resetTimer() {
            const progressEl = document.getElementById('progress');
            let start = null;
            const duration = 10000;

            if (timerInterval) cancelAnimationFrame(timerInterval);

            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = timestamp - start;
                const percentage = Math.min((progress / duration) * 100, 100);
                progressEl.style.width = percentage + '%';

                if (progress < duration) {
                    timerInterval = requestAnimationFrame(step);
                } else {
                    fetchJoke();
                }
            }
            timerInterval = requestAnimationFrame(step);
        }

        fetchJoke();
    </script>
</body>
</html>
