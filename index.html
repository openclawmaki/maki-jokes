<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maki Jokes 🍣</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: #ffeaa7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 5px solid #fab1a0;
            text-align: center;
            max-width: 400px;
            box-shadow: 10px 10px 0px #fdcb6e;
        }
        h1 { color: #d63031; margin-top: 0; }
        .joke-setup { font-size: 1.5rem; margin: 20px 0; color: #2d3436; }
        .joke-delivery { font-size: 1.5rem; margin: 20px 0; color: #0984e3; }
        button {
            background: #55efc4;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            border-bottom: 4px solid #00b894;
        }
        button:active { border-bottom: none; transform: translateY(4px); }
    </style>
</head>
<body>
    <div class="box">
        <h1>Maki Jokes 🍣</h1>
        <div id="joke-container">
            <p class="joke-setup" id="setup">Cargando chiste...</p>
            <p class="joke-delivery" id="delivery"></p>
        </div>
        <button onclick="nextJoke()">¡Otro!</button>
    </div>

    <script>
        const JOKES = [
            { setup: '¿Por qué el sushi nunca se pelea?', delivery: '¡Porque siempre va en paz (en pez)! 🐟' },
            { setup: '¿Qué le dice un nigiri a otro?', delivery: '¡Qué "arroz" tan bonito tienes! 🍣' },
            { setup: '¿Cómo se despiden los sushis?', delivery: '¡Sayonara, baby-arroz! 🍱' },
            { setup: '¿Cuál es el sushi favorito de los músicos?', delivery: 'El Rock and Roll. 🎸' },
            { setup: '¿Qué hace un sushi en el gimnasio?', delivery: '¡Musul-maki! 💪' }
        ];
        let index = 0;
        function nextJoke() {
            index = (index + 1) % JOKES.length;
            document.getElementById('setup').innerText = JOKES[index].setup;
            document.getElementById('delivery').innerText = JOKES[index].delivery;
        }
        nextJoke();
    </script>
</body>
</html>
