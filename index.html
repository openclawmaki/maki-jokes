<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #863bff;
        }
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        header {
            padding: 20px 30px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            opacity: 0.3;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            width: 100%;
        }
        .joke-display {
            width: 100%;
            max-width: 1200px;
            /* Ajuste dinámico de texto: grande pero flexible */
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.03em;
            text-align: left;
            word-wrap: break-word;
        }
        .delivery {
            font-weight: 700;
            margin-top: 0.5em;
            color: var(--accent-color);
        }
        .timer-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
        }
        .timer-progress {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
        }
        .counter {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 0.8rem;
            color: #65676b;
            opacity: 0.6;
            font-weight: 400;
            cursor: pointer;
            z-index: 20;
        }
        #log-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 100;
            display: none;
            overflow-y: auto;
            padding: 20px;
            font-size: 0.75rem;
            color: #000;
            letter-spacing: -0.01em;
        }
        .log-entry {
            padding: 8px 0;
            line-height: 1.2;
            border: none;
            display: flex;
            gap: 10px;
        }
        .log-index {
            opacity: 0.2;
            min-width: 20px;
        }
        .log-text {
            opacity: 0.3;
        }
        .log-text.seen {
            opacity: 1;
        }
        .log-close {
            position: sticky;
            top: 0;
            background: #fff;
            padding: 10px 0 20px 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-reset {
            color: #d63031;
            display: none;
        }
    </style>
</head>
<body>
    <div id="log-overlay">
        <div class="log-close">
            <span onclick="toggleLog()">Cerrar</span>
            <span id="reset-btn" class="log-reset" onclick="resetHistory()">Reset Historial</span>
        </div>
        <div id="log-content"></div>
    </div>
    <header>
        <h1>Maki</h1>
    </header>
    <main>
        <div class="joke-display" id="joke-container">
            <div id="setup">Cargando...</div>
            <div id="delivery" class="delivery"></div>
        </div>
    </main>
    <div class="counter" id="counter" onclick="toggleLog()">Vistos: 0 / 0</div>
    <div class="timer-container">
        <div class="timer-progress" id="progress"></div>
    </div>

    <script>
        const JOKE_FILE = 'jokes.json';
        let seenJokes = JSON.parse(localStorage.getItem('seenJokes')) || [];
        let timerInterval;

        async function fetchJoke() {
            const setupEl = document.getElementById('setup');
            const deliveryEl = document.getElementById('delivery');
            
            if (timerInterval) cancelAnimationFrame(timerInterval);
            
            try {
                const response = await fetch(`${JOKE_FILE}?cb=${Date.now()}`);
                const jokes = await response.json();
                window.allJokes = jokes; // Guardar para el log
                
                // Filtramos los que no hayamos visto
                let availableJokes = jokes.filter(j => !seenJokes.includes(j.id));
                
                // Si los hemos visto todos, reseteamos el historial local
                if (availableJokes.length === 0) {
                    seenJokes = [];
                    availableJokes = jokes;
                }

                const data = availableJokes[Math.floor(Math.random() * availableJokes.length)];

                seenJokes.push(data.id);
                localStorage.setItem('seenJokes', JSON.stringify(seenJokes));
                
                setupEl.innerText = data.setup;
                deliveryEl.innerText = data.delivery || ''; // Si no hay delivery, queda vacío
                
                const progressTotal = Math.round((seenJokes.length / jokes.length) * 100);
                document.getElementById('counter').innerText = `Vistos ${progressTotal}%`;
            } catch (error) {
                setupEl.innerText = "Error al cargar chistes locales.";
                deliveryEl.innerText = "";
            }
        }

        function toggleLog() {
            const overlay = document.getElementById('log-overlay');
            const content = document.getElementById('log-content');
            const resetBtn = document.getElementById('reset-btn');
            
            if (overlay.style.display === 'block') {
                overlay.style.display = 'none';
            } else {
                content.innerHTML = '';
                // Filtramos para mostrar solo los vistos
                const seenJokesData = window.allJokes.filter(j => seenJokes.includes(j.id));
                
                // Mostrar botón de reset si se ha visto más del 80%
                const progress = seenJokes.length / window.allJokes.length;
                resetBtn.style.display = progress >= 0.8 ? 'inline' : 'none';

                seenJokesData.forEach((j, i) => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    div.innerHTML = `
                        <span class="log-index">${String(i + 1).padStart(2, '0')}</span>
                        <span class="log-text seen">
                            ${j.setup} ${j.delivery ? ' — ' + j.delivery : ''}
                        </span>
                    `;
                    content.appendChild(div);
                });
                overlay.style.display = 'block';
            }
        }

        function resetHistory() {
            if (confirm('¿Quieres resetear el historial de chistes vistos?')) {
                seenJokes = [];
                localStorage.setItem('seenJokes', JSON.stringify(seenJokes));
                toggleLog();
                fetchJoke();
            }
        }

        function resetTimer() {
            const progressEl = document.getElementById('progress');
            let start = null;
            const duration = 10000;

            if (timerInterval) cancelAnimationFrame(timerInterval);

            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = timestamp - start;
                const percentage = Math.min((progress / duration) * 100, 100);
                progressEl.style.width = percentage + '%';

                if (progress < duration) {
                    timerInterval = requestAnimationFrame(step);
                } else {
                    fetchJoke();
                }
            }
            timerInterval = requestAnimationFrame(step);
        }

        fetchJoke();
    </script>
</body>
</html>
